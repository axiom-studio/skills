apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-bitbucket
  name: Bitbucket Skill
  description: Bitbucket repository operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: devops
  tags:
    - bitbucket
    - git
    - repository
    - pipeline
  icon: git-branch
  color: "#0052CC"
spec:
  executorType: grpc
  nodeTypes:
    - bitbucket-repo-list
    - bitbucket-repo-get
    - bitbucket-pr-list
    - bitbucket-pr-create
    - bitbucket-pr-merge
    - bitbucket-pipeline-trigger
    - bitbucket-pipeline-status
    - bitbucket-commit-list
    - bitbucket-branch-list
  inputs:
    bitbucket-repo-list:
      - name: username
        type: string
        description: Bitbucket username
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: appPassword
        type: string
        description: App password
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: workspace
        type: string
        description: Workspace slug
        required: false
        source: input
      - name: role
        type: string
        description: Filter by role (member, admin)
        required: false
        source: input
    bitbucket-repo-get:
      - name: username
        type: string
        description: Bitbucket username
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: appPassword
        type: string
        description: App password
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: workspace
        type: string
        description: Workspace slug
        required: true
        source: input
      - name: repoSlug
        type: string
        description: Repository slug
        required: true
        source: input
    bitbucket-pr-list:
      - name: username
        type: string
        description: Bitbucket username
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: appPassword
        type: string
        description: App password
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: workspace
        type: string
        description: Workspace slug
        required: true
        source: input
      - name: repoSlug
        type: string
        description: Repository slug
        required: true
        source: input
      - name: state
        type: string
        description: Filter by PR state (OPEN, MERGED, DECLINED)
        required: false
        source: input
        default: "OPEN"
    bitbucket-pr-create:
      - name: username
        type: string
        description: Bitbucket username
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: appPassword
        type: string
        description: App password
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: workspace
        type: string
        description: Workspace slug
        required: true
        source: input
      - name: repoSlug
        type: string
        description: Repository slug
        required: true
        source: input
      - name: title
        type: string
        description: PR title
        required: true
        source: input
      - name: sourceBranch
        type: string
        description: Source branch
        required: true
        source: input
      - name: destinationBranch
        type: string
        description: Destination branch
        required: true
        source: input
      - name: description
        type: string
        description: PR description
        required: false
        source: input
    bitbucket-pr-merge:
      - name: username
        type: string
        description: Bitbucket username
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: appPassword
        type: string
        description: App password
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: workspace
        type: string
        description: Workspace slug
        required: true
        source: input
      - name: repoSlug
        type: string
        description: Repository slug
        required: true
        source: input
      - name: prId
        type: string
        description: Pull request ID
        required: true
        source: input
    bitbucket-pipeline-trigger:
      - name: username
        type: string
        description: Bitbucket username
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: appPassword
        type: string
        description: App password
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: workspace
        type: string
        description: Workspace slug
        required: true
        source: input
      - name: repoSlug
        type: string
        description: Repository slug
        required: true
        source: input
      - name: branch
        type: string
        description: Branch to trigger pipeline on
        required: true
        source: input
      - name: variables
        type: object
        description: Pipeline variables
        required: false
        source: input
    bitbucket-pipeline-status:
      - name: username
        type: string
        description: Bitbucket username
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: appPassword
        type: string
        description: App password
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: workspace
        type: string
        description: Workspace slug
        required: true
        source: input
      - name: repoSlug
        type: string
        description: Repository slug
        required: true
        source: input
      - name: pipelineId
        type: string
        description: Pipeline UUID
        required: true
        source: input
    bitbucket-commit-list:
      - name: username
        type: string
        description: Bitbucket username
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: appPassword
        type: string
        description: App password
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: workspace
        type: string
        description: Workspace slug
        required: true
        source: input
      - name: repoSlug
        type: string
        description: Repository slug
        required: true
        source: input
      - name: branch
        type: string
        description: Filter by branch
        required: false
        source: input
    bitbucket-branch-list:
      - name: username
        type: string
        description: Bitbucket username
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: appPassword
        type: string
        description: App password
        required: true
        source: connection
        binding: vault://bitbucket-credentials
      - name: workspace
        type: string
        description: Workspace slug
        required: true
        source: input
      - name: repoSlug
        type: string
        description: Repository slug
        required: true
        source: input
  grpc:
    port: 50125
    binary:
      linux-amd64: skill-bitbucket-linux-amd64
      linux-arm64: skill-bitbucket-linux-arm64
      darwin-amd64: skill-bitbucket-darwin-amd64
      darwin-arm64: skill-bitbucket-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - bitbucket:read
    - bitbucket:write