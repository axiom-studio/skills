apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-airflow
  name: Apache Airflow Skill
  description: Apache Airflow workflow orchestration for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: data
  tags:
    - airflow
    - workflow
    - orchestration
    - dag
  icon: wind
  color: "#017CEE"
spec:
  executorType: grpc
  nodeTypes:
    - airflow-dag-list
    - airflow-dag-trigger
    - airflow-dag-status
    - airflow-dag-pause
    - airflow-dag-unpause
    - airflow-task-list
    - airflow-task-logs
    - airflow-run-list
    - airflow-connection-list
  grpc:
    port: 50104
    binary:
      linux-amd64: skill-airflow-linux-amd64
      linux-arm64: skill-airflow-linux-arm64
      darwin-amd64: skill-airflow-darwin-amd64
      darwin-arm64: skill-airflow-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - airflow:read
    - airflow:write