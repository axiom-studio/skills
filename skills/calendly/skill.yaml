apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-calendly
  name: Calendly Skill
  description: Calendly scheduling operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: productivity
  tags:
    - calendly
    - scheduling
    - calendar
    - meetings
  icon: calendar
  color: "#006BFF"
spec:
  executorType: grpc
  nodeTypes:
    - calendly-event-list
    - calendly-event-get
    - calendly-event-create
    - calendly-cancel
    - calendly-reschedule
    - calendly-availability
    - calendly-user-get
    - calendly-webhook-create
  grpc:
    port: 50119
    binary:
      linux-amd64: skill-calendly-linux-amd64
      linux-arm64: skill-calendly-linux-arm64
      darwin-amd64: skill-calendly-darwin-amd64
      darwin-arm64: skill-calendly-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - calendly:read
    - calendly:write