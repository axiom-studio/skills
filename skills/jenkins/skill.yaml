apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-jenkins
  name: Jenkins Skill
  description: Jenkins CI/CD server operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: devops
  tags:
    - jenkins
    - ci-cd
    - build
    - pipeline
  icon: settings
  color: "#D24939"
spec:
  executorType: grpc
  nodeTypes:
    - jenkins-job-list
    - jenkins-job-trigger
    - jenkins-job-status
    - jenkins-build-list
    - jenkins-build-logs
    - jenkins-build-abort
    - jenkins-node-list
    - jenkins-queue-list
    - jenkins-view-list
    - jenkins-credential-list
    - jenkins-plugin-list
  inputs:
    jenkins-job-list:
      - name: url
        type: string
        description: Jenkins server URL
        required: true
        source: input
      - name: username
        type: string
        description: Jenkins username
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: password
        type: string
        description: API token or password
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: folder
        type: string
        description: Folder path
        required: false
        source: input
    jenkins-job-trigger:
      - name: url
        type: string
        description: Jenkins server URL
        required: true
        source: input
      - name: username
        type: string
        description: Jenkins username
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: password
        type: string
        description: API token or password
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: jobName
        type: string
        description: Job name
        required: true
        source: input
      - name: parameters
        type: object
        description: Build parameters
        required: false
        source: input
      - name: folder
        type: string
        description: Folder path
        required: false
        source: input
    jenkins-job-status:
      - name: url
        type: string
        description: Jenkins server URL
        required: true
        source: input
      - name: username
        type: string
        description: Jenkins username
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: password
        type: string
        description: API token or password
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: jobName
        type: string
        description: Job name
        required: true
        source: input
      - name: buildNumber
        type: integer
        description: Build number
        required: false
        source: input
    jenkins-build-list:
      - name: url
        type: string
        description: Jenkins server URL
        required: true
        source: input
      - name: username
        type: string
        description: Jenkins username
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: password
        type: string
        description: API token or password
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: jobName
        type: string
        description: Job name
        required: true
        source: input
      - name: limit
        type: integer
        description: Max builds to return
        required: false
        source: input
        default: 10
    jenkins-build-logs:
      - name: url
        type: string
        description: Jenkins server URL
        required: true
        source: input
      - name: username
        type: string
        description: Jenkins username
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: password
        type: string
        description: API token or password
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: jobName
        type: string
        description: Job name
        required: true
        source: input
      - name: buildNumber
        type: integer
        description: Build number
        required: false
        source: input
      - name: startLine
        type: integer
        description: Start line for logs
        required: false
        source: input
        default: 0
    jenkins-build-abort:
      - name: url
        type: string
        description: Jenkins server URL
        required: true
        source: input
      - name: username
        type: string
        description: Jenkins username
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: password
        type: string
        description: API token or password
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: jobName
        type: string
        description: Job name
        required: true
        source: input
      - name: buildNumber
        type: integer
        description: Build number to abort
        required: true
        source: input
    jenkins-node-list:
      - name: url
        type: string
        description: Jenkins server URL
        required: true
        source: input
      - name: username
        type: string
        description: Jenkins username
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: password
        type: string
        description: API token or password
        required: true
        source: connection
        binding: vault://jenkins-credentials
    jenkins-queue-list:
      - name: url
        type: string
        description: Jenkins server URL
        required: true
        source: input
      - name: username
        type: string
        description: Jenkins username
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: password
        type: string
        description: API token or password
        required: true
        source: connection
        binding: vault://jenkins-credentials
    jenkins-view-list:
      - name: url
        type: string
        description: Jenkins server URL
        required: true
        source: input
      - name: username
        type: string
        description: Jenkins username
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: password
        type: string
        description: API token or password
        required: true
        source: connection
        binding: vault://jenkins-credentials
    jenkins-credential-list:
      - name: url
        type: string
        description: Jenkins server URL
        required: true
        source: input
      - name: username
        type: string
        description: Jenkins username
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: password
        type: string
        description: API token or password
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: domain
        type: string
        description: Credential domain
        required: false
        source: input
    jenkins-plugin-list:
      - name: url
        type: string
        description: Jenkins server URL
        required: true
        source: input
      - name: username
        type: string
        description: Jenkins username
        required: true
        source: connection
        binding: vault://jenkins-credentials
      - name: password
        type: string
        description: API token or password
        required: true
        source: connection
        binding: vault://jenkins-credentials
  grpc:
    port: 50085
    binary:
      linux-amd64: skill-jenkins-linux-amd64
      linux-arm64: skill-jenkins-linux-arm64
      darwin-amd64: skill-jenkins-darwin-amd64
      darwin-arm64: skill-jenkins-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - jenkins:read
    - jenkins:write