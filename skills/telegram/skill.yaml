apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-telegram
  name: Telegram Skill
  description: Telegram messaging bot operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: communication
  tags:
    - telegram
    - messaging
    - bot
    - chat
  icon: send
  color: "#0088CC"
spec:
  executorType: grpc
  nodeTypes:
    - telegram-send-message
    - telegram-edit-message
    - telegram-delete-message
    - telegram-send-photo
    - telegram-send-document
    - telegram-get-updates
    - telegram-get-chat
    - telegram-set-webhook
  inputs:
    telegram-send-message:
      - name: botToken
        type: string
        description: Telegram bot token
        required: true
        source: connection
        binding: vault://telegram-credentials
      - name: chatId
        type: string
        description: Chat ID or username
        required: true
        source: input
      - name: text
        type: string
        description: Message text
        required: true
        source: input
      - name: parseMode
        type: string
        description: Parse mode (HTML, Markdown)
        required: false
        source: input
      - name: disableNotification
        type: boolean
        description: Disable notifications
        required: false
        source: default
        default: false
      - name: replyToMessageId
        type: integer
        description: Reply to message ID
        required: false
        source: input
    telegram-edit-message:
      - name: botToken
        type: string
        description: Telegram bot token
        required: true
        source: connection
        binding: vault://telegram-credentials
      - name: chatId
        type: string
        description: Chat ID
        required: true
        source: input
      - name: messageId
        type: integer
        description: Message ID to edit
        required: true
        source: input
      - name: text
        type: string
        description: New message text
        required: true
        source: input
      - name: parseMode
        type: string
        description: Parse mode
        required: false
        source: input
    telegram-delete-message:
      - name: botToken
        type: string
        description: Telegram bot token
        required: true
        source: connection
        binding: vault://telegram-credentials
      - name: chatId
        type: string
        description: Chat ID
        required: true
        source: input
      - name: messageId
        type: integer
        description: Message ID to delete
        required: true
        source: input
    telegram-send-photo:
      - name: botToken
        type: string
        description: Telegram bot token
        required: true
        source: connection
        binding: vault://telegram-credentials
      - name: chatId
        type: string
        description: Chat ID
        required: true
        source: input
      - name: photo
        type: string
        description: Photo URL or file ID
        required: true
        source: input
      - name: caption
        type: string
        description: Photo caption
        required: false
        source: input
    telegram-send-document:
      - name: botToken
        type: string
        description: Telegram bot token
        required: true
        source: connection
        binding: vault://telegram-credentials
      - name: chatId
        type: string
        description: Chat ID
        required: true
        source: input
      - name: document
        type: string
        description: Document URL or file ID
        required: true
        source: input
      - name: caption
        type: string
        description: Document caption
        required: false
        source: input
    telegram-get-updates:
      - name: botToken
        type: string
        description: Telegram bot token
        required: true
        source: connection
        binding: vault://telegram-credentials
      - name: offset
        type: integer
        description: Offset for updates
        required: false
        source: input
      - name: limit
        type: integer
        description: Max updates to return
        required: false
        source: input
      - name: timeout
        type: integer
        description: Long polling timeout
        required: false
        source: input
    telegram-get-chat:
      - name: botToken
        type: string
        description: Telegram bot token
        required: true
        source: connection
        binding: vault://telegram-credentials
      - name: chatId
        type: string
        description: Chat ID
        required: true
        source: input
    telegram-set-webhook:
      - name: botToken
        type: string
        description: Telegram bot token
        required: true
        source: connection
        binding: vault://telegram-credentials
      - name: url
        type: string
        description: Webhook URL
        required: true
        source: input
      - name: secretToken
        type: string
        description: Secret token for verification
        required: false
        source: connection
        binding: vault://telegram-credentials
  grpc:
    port: 50109
    binary:
      linux-amd64: skill-telegram-linux-amd64
      linux-arm64: skill-telegram-linux-arm64
      darwin-amd64: skill-telegram-darwin-amd64
      darwin-arm64: skill-telegram-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - telegram:read
    - telegram:write