apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-replicate
  name: Replicate Skill
  description: Replicate ML model hosting operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: ai
  tags:
    - replicate
    - ml
    - models
    - inference
  icon: cpu
  color: "#000000"
spec:
  executorType: grpc
  nodeTypes:
    - replicate-run
    - replicate-prediction-status
    - replicate-prediction-cancel
    - replicate-model-list
    - replicate-model-get
    - replicate-training-create
    - replicate-training-status
  inputs:
    replicate-run:
      - name: apiToken
        type: string
        description: Replicate API token
        required: true
        source: connection
        binding: vault://replicate-credentials
      - name: model
        type: string
        description: Model name (owner/name)
        required: true
        source: input
      - name: version
        type: string
        description: Model version
        required: false
        source: input
      - name: input
        type: object
        description: Model input parameters
        required: true
        source: input
      - name: wait
        type: boolean
        description: Wait for completion
        required: false
        source: default
        default: false
    replicate-prediction-status:
      - name: apiToken
        type: string
        description: Replicate API token
        required: true
        source: connection
        binding: vault://replicate-credentials
      - name: predictionId
        type: string
        description: Prediction ID
        required: true
        source: input
    replicate-prediction-cancel:
      - name: apiToken
        type: string
        description: Replicate API token
        required: true
        source: connection
        binding: vault://replicate-credentials
      - name: predictionId
        type: string
        description: Prediction ID
        required: true
        source: input
    replicate-model-list:
      - name: apiToken
        type: string
        description: Replicate API token
        required: true
        source: connection
        binding: vault://replicate-credentials
    replicate-model-get:
      - name: apiToken
        type: string
        description: Replicate API token
        required: true
        source: connection
        binding: vault://replicate-credentials
      - name: model
        type: string
        description: Model name (owner/name)
        required: true
        source: input
    replicate-training-create:
      - name: apiToken
        type: string
        description: Replicate API token
        required: true
        source: connection
        binding: vault://replicate-credentials
      - name: model
        type: string
        description: Model name (owner/name)
        required: true
        source: input
      - name: destination
        type: string
        description: Destination model
        required: true
        source: input
      - name: input
        type: object
        description: Training input parameters
        required: true
        source: input
    replicate-training-status:
      - name: apiToken
        type: string
        description: Replicate API token
        required: true
        source: connection
        binding: vault://replicate-credentials
      - name: trainingId
        type: string
        description: Training ID
        required: true
        source: input
  grpc:
    port: 50099
    binary:
      linux-amd64: skill-replicate-linux-amd64
      linux-arm64: skill-replicate-linux-arm64
      darwin-amd64: skill-replicate-darwin-amd64
      darwin-arm64: skill-replicate-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - replicate:read
    - replicate:write