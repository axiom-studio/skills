apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-monday
  name: Monday.com Skill
  description: Monday.com work management operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: project-management
  tags:
    - monday
    - project
    - work
    - boards
  icon: layout
  color: "#FF3D57"
spec:
  executorType: grpc
  nodeTypes:
    - monday-board-list
    - monday-board-get
    - monday-item-list
    - monday-item-create
    - monday-item-update
    - monday-column-list
    - monday-group-list
    - monday-query
  grpc:
    port: 50107
    binary:
      linux-amd64: skill-monday-linux-amd64
      linux-arm64: skill-monday-linux-arm64
      darwin-amd64: skill-monday-darwin-amd64
      darwin-arm64: skill-monday-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - monday:read
    - monday:write