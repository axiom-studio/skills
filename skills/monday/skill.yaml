apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-monday
  name: Monday.com Skill
  description: Monday.com work management operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: project-management
  tags:
    - monday
    - project
    - work
    - boards
  icon: layout
  color: "#FF3D57"
spec:
  executorType: grpc
  nodeTypes:
    - monday-board-list
    - monday-board-get
    - monday-item-list
    - monday-item-create
    - monday-item-update
    - monday-column-list
    - monday-group-list
    - monday-query
  inputs:
    monday-board-list:
      - name: apiToken
        type: string
        description: Monday.com API token
        required: true
        source: connection
        binding: vault://monday-credentials
      - name: boardIds
        type: array
        description: Filter by board IDs
        required: false
        source: input
      - name: limit
        type: integer
        description: Maximum results
        required: false
        source: input
        default: 25
    monday-board-get:
      - name: apiToken
        type: string
        description: Monday.com API token
        required: true
        source: connection
        binding: vault://monday-credentials
      - name: boardId
        type: integer
        description: Board ID
        required: true
        source: input
    monday-item-list:
      - name: apiToken
        type: string
        description: Monday.com API token
        required: true
        source: connection
        binding: vault://monday-credentials
      - name: boardId
        type: integer
        description: Board ID
        required: true
        source: input
      - name: limit
        type: integer
        description: Maximum results
        required: false
        source: input
        default: 25
    monday-item-create:
      - name: apiToken
        type: string
        description: Monday.com API token
        required: true
        source: connection
        binding: vault://monday-credentials
      - name: boardId
        type: integer
        description: Board ID
        required: true
        source: input
      - name: name
        type: string
        description: Item name
        required: true
        source: input
      - name: groupId
        type: string
        description: Group ID
        required: false
        source: input
      - name: columnValues
        type: object
        description: Column values
        required: false
        source: input
    monday-item-update:
      - name: apiToken
        type: string
        description: Monday.com API token
        required: true
        source: connection
        binding: vault://monday-credentials
      - name: itemId
        type: integer
        description: Item ID
        required: true
        source: input
      - name: name
        type: string
        description: New item name
        required: false
        source: input
      - name: columnValues
        type: object
        description: Column values
        required: false
        source: input
    monday-column-list:
      - name: apiToken
        type: string
        description: Monday.com API token
        required: true
        source: connection
        binding: vault://monday-credentials
      - name: boardId
        type: integer
        description: Board ID
        required: true
        source: input
    monday-group-list:
      - name: apiToken
        type: string
        description: Monday.com API token
        required: true
        source: connection
        binding: vault://monday-credentials
      - name: boardId
        type: integer
        description: Board ID
        required: true
        source: input
    monday-query:
      - name: apiToken
        type: string
        description: Monday.com API token
        required: true
        source: connection
        binding: vault://monday-credentials
      - name: query
        type: string
        description: GraphQL query
        required: true
        source: input
      - name: variables
        type: object
        description: Query variables
        required: false
        source: input
  grpc:
    port: 50107
    binary:
      linux-amd64: skill-monday-linux-amd64
      linux-arm64: skill-monday-linux-arm64
      darwin-amd64: skill-monday-darwin-amd64
      darwin-arm64: skill-monday-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - monday:read
    - monday:write