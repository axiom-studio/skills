apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-langsmith
  name: LangSmith Skill
  description: LangSmith LLM observability operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: ai
  tags:
    - langsmith
    - langchain
    - observability
    - tracing
  icon: search
  color: "#1C3C3C"
spec:
  executorType: grpc
  nodeTypes:
    - langsmith-trace-list
    - langsmith-trace-get
    - langsmith-project-create
    - langsmith-project-list
    - langsmith-dataset-create
    - langsmith-dataset-list
    - langsmith-run-eval
    - langsmith-feedback-create
    - langsmith-feedback-list
  inputs:
    langsmith-trace-list:
      - name: apiKey
        type: string
        description: LangSmith API key
        required: true
        source: connection
        binding: vault://langsmith-credentials
      - name: projectId
        type: string
        description: Filter by project ID
        required: false
        source: input
      - name: traceId
        type: string
        description: Filter by trace ID
        required: false
        source: input
      - name: limit
        type: integer
        description: Maximum results
        required: false
        source: input
        default: 20
    langsmith-trace-get:
      - name: apiKey
        type: string
        description: LangSmith API key
        required: true
        source: connection
        binding: vault://langsmith-credentials
      - name: traceId
        type: string
        description: Trace ID
        required: true
        source: input
    langsmith-project-create:
      - name: apiKey
        type: string
        description: LangSmith API key
        required: true
        source: connection
        binding: vault://langsmith-credentials
      - name: name
        type: string
        description: Project name
        required: true
        source: input
      - name: description
        type: string
        description: Project description
        required: false
        source: input
    langsmith-project-list:
      - name: apiKey
        type: string
        description: LangSmith API key
        required: true
        source: connection
        binding: vault://langsmith-credentials
    langsmith-dataset-create:
      - name: apiKey
        type: string
        description: LangSmith API key
        required: true
        source: connection
        binding: vault://langsmith-credentials
      - name: name
        type: string
        description: Dataset name
        required: true
        source: input
      - name: description
        type: string
        description: Dataset description
        required: false
        source: input
    langsmith-dataset-list:
      - name: apiKey
        type: string
        description: LangSmith API key
        required: true
        source: connection
        binding: vault://langsmith-credentials
    langsmith-run-eval:
      - name: apiKey
        type: string
        description: LangSmith API key
        required: true
        source: connection
        binding: vault://langsmith-credentials
      - name: datasetId
        type: string
        description: Dataset ID
        required: true
        source: input
      - name: evaluator
        type: object
        description: Evaluator configuration
        required: true
        source: input
      - name: llmOrChain
        type: object
        description: LLM or chain to evaluate
        required: true
        source: input
    langsmith-feedback-create:
      - name: apiKey
        type: string
        description: LangSmith API key
        required: true
        source: connection
        binding: vault://langsmith-credentials
      - name: runId
        type: string
        description: Run ID
        required: true
        source: input
      - name: key
        type: string
        description: Feedback key
        required: true
        source: input
      - name: score
        type: number
        description: Feedback score
        required: false
        source: input
      - name: value
        type: string
        description: Feedback value
        required: false
        source: input
      - name: comment
        type: string
        description: Feedback comment
        required: false
        source: input
    langsmith-feedback-list:
      - name: apiKey
        type: string
        description: LangSmith API key
        required: true
        source: connection
        binding: vault://langsmith-credentials
      - name: runId
        type: string
        description: Filter by run ID
        required: false
        source: input
      - name: key
        type: string
        description: Filter by feedback key
        required: false
        source: input
  grpc:
    port: 50100
    binary:
      linux-amd64: skill-langsmith-linux-amd64
      linux-arm64: skill-langsmith-linux-arm64
      darwin-amd64: skill-langsmith-darwin-amd64
      darwin-arm64: skill-langsmith-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - langsmith:read
    - langsmith:write