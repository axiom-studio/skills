apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-nats
  name: NATS Skill
  description: NATS messaging system operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: messaging
  tags:
    - nats
    - messaging
    - pub-sub
    - jetstream
  icon: radio
  color: "#27AAE1"
spec:
  executorType: grpc
  nodeTypes:
    - nats-publish
    - nats-subscribe
    - nats-request
    - nats-jetstream-create
    - nats-jetstream-list
    - nats-consumer-create
    - nats-consumer-list
    - nats-stream-info
  grpc:
    port: 50091
    binary:
      linux-amd64: skill-nats-linux-amd64
      linux-arm64: skill-nats-linux-arm64
      darwin-amd64: skill-nats-darwin-amd64
      darwin-arm64: skill-nats-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - nats:read
    - nats:write