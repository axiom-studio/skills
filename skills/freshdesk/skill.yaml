apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-freshdesk
  name: Freshdesk Skill
  description: Freshdesk helpdesk operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: communication
  tags:
    - freshdesk
    - helpdesk
    - support
    - tickets
  icon: life-buoy
  color: "#7ED321"
spec:
  executorType: grpc
  nodeTypes:
    - freshdesk-ticket-list
    - freshdesk-ticket-create
    - freshdesk-ticket-update
    - freshdesk-ticket-reply
    - freshdesk-agent-list
    - freshdesk-contact-list
    - freshdesk-solution-create
    - freshdesk-article-list
  grpc:
    port: 50112
    binary:
      linux-amd64: skill-freshdesk-linux-amd64
      linux-arm64: skill-freshdesk-linux-arm64
      darwin-amd64: skill-freshdesk-darwin-amd64
      darwin-arm64: skill-freshdesk-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - freshdesk:read
    - freshdesk:write