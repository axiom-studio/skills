apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-auth0
  name: Auth0 Skill
  description: Auth0 authentication platform operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: security
  tags:
    - auth0
    - authentication
    - identity
    - oauth
  icon: lock
  color: "#EB5424"
spec:
  executorType: grpc
  nodeTypes:
    - auth0-user-list
    - auth0-user-create
    - auth0-user-update
    - auth0-user-delete
    - auth0-role-list
    - auth0-role-assign
    - auth0-connection-list
    - auth0-client-list
    - auth0-rule-list
    - auth0-log-list
  inputs:
    auth0-user-list:
      - name: domain
        type: string
        description: Auth0 domain
        required: true
        source: input
      - name: clientId
        type: string
        description: Management API client ID
        required: true
        source: connection
        binding: vault://auth0-credentials
      - name: clientSecret
        type: string
        description: Management API client secret
        required: true
        source: connection
        binding: vault://auth0-credentials
      - name: q
        type: string
        description: Search query
        required: false
        source: input
      - name: per_page
        type: integer
        description: Results per page
        required: false
        source: input
        default: 50
      - name: page
        type: integer
        description: Page number
        required: false
        source: input
        default: 0
    auth0-user-create:
      - name: domain
        type: string
        description: Auth0 domain
        required: true
        source: input
      - name: clientId
        type: string
        description: Management API client ID
        required: true
        source: connection
        binding: vault://auth0-credentials
      - name: clientSecret
        type: string
        description: Management API client secret
        required: true
        source: connection
        binding: vault://auth0-credentials
      - name: connection
        type: string
        description: Connection name
        required: true
        source: input
      - name: email
        type: string
        description: User email
        required: true
        source: input
      - name: password
        type: string
        description: Initial password
        required: false
        source: input
      - name: name
        type: string
        description: User name
        required: false
        source: input
    auth0-user-update:
      - name: domain
        type: string
        description: Auth0 domain
        required: true
        source: input
      - name: clientId
        type: string
        description: Management API client ID
        required: true
        source: connection
        binding: vault://auth0-credentials
      - name: clientSecret
        type: string
        description: Management API client secret
        required: true
        source: connection
        binding: vault://auth0-credentials
      - name: userId
        type: string
        description: User ID to update
        required: true
        source: input
      - name: email
        type: string
        description: New email
        required: false
        source: input
      - name: name
        type: string
        description: New name
        required: false
        source: input
    auth0-user-delete:
      - name: domain
        type: string
        description: Auth0 domain
        required: true
        source: input
      - name: clientId
        type: string
        description: Management API client ID
        required: true
        source: connection
        binding: vault://auth0-credentials
      - name: clientSecret
        type: string
        description: Management API client secret
        required: true
        source: connection
        binding: vault://auth0-credentials
      - name: userId
        type: string
        description: User ID to delete
        required: true
        source: input
    auth0-role-list:
      - name: domain
        type: string
        description: Auth0 domain
        required: true
        source: input
      - name: clientId
        type: string
        description: Management API client ID
        required: true
        source: connection
        binding: vault://auth0-credentials
      - name: clientSecret
        type: string
        description: Management API client secret
        required: true
        source: connection
        binding: vault://auth0-credentials
    auth0-role-assign:
      - name: domain
        type: string
        description: Auth0 domain
        required: true
        source: input
      - name: clientId
        type: string
        description: Management API client ID
        required: true
        source: connection
        binding: vault://auth0-credentials
      - name: clientSecret
        type: string
        description: Management API client secret
        required: true
        source: connection
        binding: vault://auth0-credentials
      - name: userId
        type: string
        description: User ID
        required: true
        source: input
      - name: roleId
        type: string
        description: Role ID to assign
        required: true
        source: input
    auth0-connection-list:
      - name: domain
        type: string
        description: Auth0 domain
        required: true
        source: input
      - name: clientId
        type: string
        description: Management API client ID
        required: true
        source: connection
        binding: vault://auth0-credentials
      - name: clientSecret
        type: string
        description: Management API client secret
        required: true
        source: connection
        binding: vault://auth0-credentials
    auth0-client-list:
      - name: domain
        type: string
        description: Auth0 domain
        required: true
        source: input
      - name: clientId
        type: string
        description: Management API client ID
        required: true
        source: connection
        binding: vault://auth0-credentials
      - name: clientSecret
        type: string
        description: Management API client secret
        required: true
        source: connection
        binding: vault://auth0-credentials
    auth0-rule-list:
      - name: domain
        type: string
        description: Auth0 domain
        required: true
        source: input
      - name: clientId
        type: string
        description: Management API client ID
        required: true
        source: connection
        binding: vault://auth0-credentials
      - name: clientSecret
        type: string
        description: Management API client secret
        required: true
        source: connection
        binding: vault://auth0-credentials
    auth0-log-list:
      - name: domain
        type: string
        description: Auth0 domain
        required: true
        source: input
      - name: clientId
        type: string
        description: Management API client ID
        required: true
        source: connection
        binding: vault://auth0-credentials
      - name: clientSecret
        type: string
        description: Management API client secret
        required: true
        source: connection
        binding: vault://auth0-credentials
      - name: type
        type: string
        description: Filter by log type
        required: false
        source: input
      - name: limit
        type: integer
        description: Maximum number of logs
        required: false
        source: input
        default: 50
  grpc:
    port: 50094
    binary:
      linux-amd64: skill-auth0-linux-amd64
      linux-arm64: skill-auth0-linux-arm64
      darwin-amd64: skill-auth0-darwin-amd64
      darwin-arm64: skill-auth0-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - auth0:read
    - auth0:write