apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-linear
  name: Linear Skill
  description: Linear issue tracking operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: project-management
  tags:
    - linear
    - issues
    - tracking
    - agile
  icon: check-square
  color: "#5E6AD2"
spec:
  executorType: grpc
  nodeTypes:
    - linear-issue-create
    - linear-issue-update
    - linear-issue-search
    - linear-comment
    - linear-cycle
    - linear-project
  inputs:
    linear-issue-create:
      - name: apiToken
        type: string
        description: Linear API token
        required: true
        source: connection
        binding: vault://linear-credentials
      - name: teamId
        type: string
        description: Team ID
        required: true
        source: input
      - name: title
        type: string
        description: Issue title
        required: true
        source: input
      - name: description
        type: string
        description: Issue description
        required: false
        source: input
      - name: priority
        type: integer
        description: Priority (-2=urgent, 0=normal)
        required: false
        source: input
        default: 0
      - name: assigneeId
        type: string
        description: Assignee user ID
        required: false
        source: input
      - name: labelIds
        type: array
        description: Label IDs
        required: false
        source: input
      - name: projectId
        type: string
        description: Project ID
        required: false
        source: input
    linear-issue-update:
      - name: apiToken
        type: string
        description: Linear API token
        required: true
        source: connection
        binding: vault://linear-credentials
      - name: issueId
        type: string
        description: Issue ID to update
        required: true
        source: input
      - name: title
        type: string
        description: New title
        required: false
        source: input
      - name: description
        type: string
        description: New description
        required: false
        source: input
      - name: priority
        type: integer
        description: New priority
        required: false
        source: input
      - name: stateId
        type: string
        description: New state ID
        required: false
        source: input
      - name: assigneeId
        type: string
        description: New assignee ID
        required: false
        source: input
    linear-issue-search:
      - name: apiToken
        type: string
        description: Linear API token
        required: true
        source: connection
        binding: vault://linear-credentials
      - name: query
        type: string
        description: Linear search query
        required: true
        source: input
      - name: teamId
        type: string
        description: Filter by team ID
        required: false
        source: input
      - name: maxResults
        type: integer
        description: Maximum results
        required: false
        source: input
        default: 50
    linear-comment:
      - name: apiToken
        type: string
        description: Linear API token
        required: true
        source: connection
        binding: vault://linear-credentials
      - name: issueId
        type: string
        description: Issue ID
        required: true
        source: input
      - name: body
        type: string
        description: Comment body (Markdown)
        required: true
        source: input
    linear-cycle:
      - name: apiToken
        type: string
        description: Linear API token
        required: true
        source: connection
        binding: vault://linear-credentials
      - name: operation
        type: string
        description: Operation (list, get, getIssues)
        required: true
        source: input
      - name: teamId
        type: string
        description: Team ID
        required: false
        source: input
      - name: cycleId
        type: string
        description: Cycle ID (required for get operations)
        required: false
        source: input
    linear-project:
      - name: apiToken
        type: string
        description: Linear API token
        required: true
        source: connection
        binding: vault://linear-credentials
      - name: operation
        type: string
        description: Operation (list, get, getIssues)
        required: true
        source: input
      - name: teamId
        type: string
        description: Team ID
        required: false
        source: input
      - name: projectId
        type: string
        description: Project ID (required for get operations)
        required: false
        source: input
  grpc:
    port: 50054
    binary:
      linux-amd64: skill-linear-linux-amd64
      linux-arm64: skill-linear-linux-arm64
      darwin-amd64: skill-linear-darwin-amd64
      darwin-arm64: skill-linear-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - linear:read
    - linear:write
