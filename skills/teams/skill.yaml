apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-teams
  name: Microsoft Teams Skill
  description: Microsoft Teams messaging operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: communication
  tags:
    - teams
    - microsoft
    - chat
    - messaging
  icon: message-circle
  color: "#6264A7"
spec:
  executorType: grpc
  nodeTypes:
    - teams-send
    - teams-card
    - teams-channel
    - teams-meeting
    - teams-user
  grpc:
    port: 50054
    binary:
      linux-amd64: skill-teams-linux-amd64
      linux-arm64: skill-teams-linux-arm64
      darwin-amd64: skill-teams-darwin-amd64
      darwin-arm64: skill-teams-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - teams:send
    - teams:read
    - teams:manage
