apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-fivetran
  name: Fivetran Skill
  description: Fivetran data pipeline operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: data
  tags:
    - fivetran
    - etl
    - data
    - integration
  icon: database
  color: "#FF6B35"
spec:
  executorType: grpc
  nodeTypes:
    - fivetran-connector-list
    - fivetran-connector-create
    - fivetran-connector-sync
    - fivetran-connector-status
    - fivetran-destination-list
    - fivetran-schema-config
    - fivetran-group-list
  inputs:
    fivetran-connector-list:
      - name: apiKey
        type: string
        description: Fivetran API key
        required: true
        source: connection
        binding: vault://fivetran-credentials
      - name: apiSecret
        type: string
        description: Fivetran API secret
        required: true
        source: connection
        binding: vault://fivetran-credentials
      - name: groupId
        type: string
        description: Filter by group ID
        required: false
        source: input
    fivetran-connector-create:
      - name: apiKey
        type: string
        description: Fivetran API key
        required: true
        source: connection
        binding: vault://fivetran-credentials
      - name: apiSecret
        type: string
        description: Fivetran API secret
        required: true
        source: connection
        binding: vault://fivetran-credentials
      - name: groupId
        type: string
        description: Group ID
        required: true
        source: input
      - name: service
        type: string
        description: Service name
        required: true
        source: input
      - name: config
        type: object
        description: Connector configuration
        required: true
        source: input
      - name: paused
        type: boolean
        description: Pause connector
        required: false
        source: default
        default: false
    fivetran-connector-sync:
      - name: apiKey
        type: string
        description: Fivetran API key
        required: true
        source: connection
        binding: vault://fivetran-credentials
      - name: apiSecret
        type: string
        description: Fivetran API secret
        required: true
        source: connection
        binding: vault://fivetran-credentials
      - name: connectorId
        type: string
        description: Connector ID
        required: true
        source: input
    fivetran-connector-status:
      - name: apiKey
        type: string
        description: Fivetran API key
        required: true
        source: connection
        binding: vault://fivetran-credentials
      - name: apiSecret
        type: string
        description: Fivetran API secret
        required: true
        source: connection
        binding: vault://fivetran-credentials
      - name: connectorId
        type: string
        description: Connector ID
        required: true
        source: input
    fivetran-destination-list:
      - name: apiKey
        type: string
        description: Fivetran API key
        required: true
        source: connection
        binding: vault://fivetran-credentials
      - name: apiSecret
        type: string
        description: Fivetran API secret
        required: true
        source: connection
        binding: vault://fivetran-credentials
    fivetran-schema-config:
      - name: apiKey
        type: string
        description: Fivetran API key
        required: true
        source: connection
        binding: vault://fivetran-credentials
      - name: apiSecret
        type: string
        description: Fivetran API secret
        required: true
        source: connection
        binding: vault://fivetran-credentials
      - name: connectorId
        type: string
        description: Connector ID
        required: true
        source: input
      - name: schema
        type: object
        description: Schema configuration
        required: true
        source: input
    fivetran-group-list:
      - name: apiKey
        type: string
        description: Fivetran API key
        required: true
        source: connection
        binding: vault://fivetran-credentials
      - name: apiSecret
        type: string
        description: Fivetran API secret
        required: true
        source: connection
        binding: vault://fivetran-credentials
  grpc:
    port: 50102
    binary:
      linux-amd64: skill-fivetran-linux-amd64
      linux-arm64: skill-fivetran-linux-arm64
      darwin-amd64: skill-fivetran-darwin-amd64
      darwin-arm64: skill-fivetran-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - fivetran:read
    - fivetran:write