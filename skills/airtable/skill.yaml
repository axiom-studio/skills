apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-airtable
  name: Airtable Skill
  description: Airtable database operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: data
  tags:
    - airtable
    - database
    - spreadsheet
    - no-code
  icon: table
  color: "#FCB400"
spec:
  executorType: grpc
  nodeTypes:
    - airtable-list
    - airtable-create
    - airtable-update
    - airtable-delete
    - airtable-search
  grpc:
    port: 50052
    binary:
      linux-amd64: skill-airtable-linux-amd64
      linux-arm64: skill-airtable-linux-arm64
      darwin-amd64: skill-airtable-darwin-amd64
      darwin-arm64: skill-airtable-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - airtable:read
    - airtable:write
