apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-newrelic
  name: New Relic Skill
  description: New Relic observability operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: monitoring
  tags:
    - newrelic
    - observability
    - apm
    - monitoring
  icon: activity
  color: "#008C99"
spec:
  executorType: grpc
  nodeTypes:
    - newrelic-query-nrql
    - newrelic-deploy-marker
    - newrelic-alert-policy-list
    - newrelic-alert-policy-create
    - newrelic-dashboard-list
    - newrelic-dashboard-create
    - newrelic-apdex
    - newrelic-application-list
  inputs:
    newrelic-query-nrql:
      - name: apiKey
        type: string
        description: New Relic API key
        required: true
        source: connection
        binding: vault://newrelic-credentials
      - name: accountId
        type: string
        description: Account ID
        required: true
        source: input
      - name: query
        type: string
        description: NRQL query
        required: true
        source: input
    newrelic-deploy-marker:
      - name: apiKey
        type: string
        description: New Relic API key
        required: true
        source: connection
        binding: vault://newrelic-credentials
      - name: accountId
        type: string
        description: Account ID
        required: true
        source: input
      - name: applicationId
        type: string
        description: Application ID
        required: true
        source: input
      - name: revision
        type: string
        description: Deployment revision
        required: true
        source: input
      - name: description
        type: string
        description: Description
        required: false
        source: input
      - name: user
        type: string
        description: Deployer name
        required: false
        source: input
    newrelic-alert-policy-list:
      - name: apiKey
        type: string
        description: New Relic API key
        required: true
        source: connection
        binding: vault://newrelic-credentials
    newrelic-alert-policy-create:
      - name: apiKey
        type: string
        description: New Relic API key
        required: true
        source: connection
        binding: vault://newrelic-credentials
      - name: name
        type: string
        description: Alert policy name
        required: true
        source: input
      - name: conditions
        type: array
        description: Alert conditions
        required: false
        source: input
    newrelic-dashboard-list:
      - name: apiKey
        type: string
        description: New Relic API key
        required: true
        source: connection
        binding: vault://newrelic-credentials
    newrelic-dashboard-create:
      - name: apiKey
        type: string
        description: New Relic API key
        required: true
        source: connection
        binding: vault://newrelic-credentials
      - name: name
        type: string
        description: Dashboard name
        required: true
        source: input
      - name: widgets
        type: array
        description: Dashboard widgets
        required: false
        source: input
    newrelic-apdex:
      - name: apiKey
        type: string
        description: New Relic API key
        required: true
        source: connection
        binding: vault://newrelic-credentials
      - name: accountId
        type: string
        description: Account ID
        required: true
        source: input
      - name: applicationId
        type: string
        description: Application ID
        required: true
        source: input
    newrelic-application-list:
      - name: apiKey
        type: string
        description: New Relic API key
        required: true
        source: connection
        binding: vault://newrelic-credentials
  grpc:
    port: 50123
    binary:
      linux-amd64: skill-newrelic-linux-amd64
      linux-arm64: skill-newrelic-linux-arm64
      darwin-amd64: skill-newrelic-darwin-amd64
      darwin-arm64: skill-newrelic-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - newrelic:read
    - newrelic:write