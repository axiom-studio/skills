        description: Namespace
        required: false
        source: input
      - name: workflowId
        type: string
        description: Workflow ID
        required: true
        source: input
      - name: runId
        type: string
        description: Run ID
        required: false
        source: input
      - name: queryType
        type: string
        description: Query type (e.g., __stack_trace)
        required: true
        source: input
      - name: queryArgs
