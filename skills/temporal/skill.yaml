        required: false
        source: connection
        binding: vault://temporal-credentials
      - name: clientKey
        type: string
        description: Client key for mTLS
        required: false
        source: connection
        binding: vault://temporal-credentials
      - name: apiKey
        type: string
        description: API key
        required: false
        source: connection
        binding: vault://temporal-credentials
    temporal-workflow-cancel:
      - name: address
