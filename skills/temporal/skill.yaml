apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-temporal
  name: Temporal Skill
  description: Temporal workflow orchestration for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: devops
  tags:
    - temporal
    - workflow
    - orchestration
    - durable
  icon: repeat
  color: "#017CEE"
spec:
  executorType: grpc
  nodeTypes:
    - temporal-workflow-start
    - temporal-workflow-list
    - temporal-workflow-get
    - temporal-workflow-cancel
    - temporal-workflow-terminate
    - temporal-signal-send
    - temporal-query
    - temporal-search-attributes
  grpc:
    port: 50129
    binary:
      linux-amd64: skill-temporal-linux-amd64
      linux-arm64: skill-temporal-linux-arm64
      darwin-amd64: skill-temporal-darwin-amd64
      darwin-arm64: skill-temporal-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - temporal:read
    - temporal:write