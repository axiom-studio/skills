apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-temporal
  name: Temporal Skill
  description: Temporal workflow orchestration for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: devops
  tags:
    - temporal
    - workflow
    - orchestration
    - durable
  icon: repeat
  color: "#017CEE"
spec:
  executorType: grpc
  nodeTypes:
    - temporal-workflow-start
    - temporal-workflow-list
    - temporal-workflow-get
    - temporal-workflow-cancel
    - temporal-workflow-terminate
    - temporal-signal-send
    - temporal-query
    - temporal-search-attributes
  inputs:
    temporal-workflow-start:
      - name: address
        type: string
        description: Temporal server address
        required: true
        source: input
      - name: namespace
        type: string
        description: Namespace
        required: false
        source: input
        default: "default"
      - name: workflowId
        type: string
        description: Workflow ID
        required: true
        source: input
      - name: workflowType
        type: string
        description: Workflow type name
        required: true
        source: input
      - name: taskQueue
        type: string
        description: Task queue name
        required: true
        source: input
      - name: input
        type: array
        description: Workflow input arguments
        required: false
        source: input
      - name: runTimeout
        type: string
        description: Run timeout
        required: false
        source: input
      - name: workflowTimeout
        type: string
        description: Workflow timeout
        required: false
        source: input
      - name: taskTimeout
        type: string
        description: Task timeout
        required: false
        source: input
      - name: retryPolicy
        type: object
        description: Retry policy configuration
        required: false
        source: input
      - name: clientCert
        type: string
        description: Client certificate for mTLS
        required: false
        source: connection
        binding: vault://temporal-credentials
      - name: clientKey
        type: string
        description: Client key for mTLS
        required: false
        source: connection
        binding: vault://temporal-credentials
      - name: apiKey
        type: string
        description: API key
        required: false
        source: connection
        binding: vault://temporal-credentials
    temporal-workflow-list:
      - name: address
        type: string
        description: Temporal server address
        required: true
        source: input
      - name: namespace
        type: string
        description: Namespace
        required: false
        source: input
      - name: query
        type: string
        description: SQL-like query filter
        required: false
        source: input
      - name: pageSize
        type: integer
        description: Page size
        required: false
        source: input
      - name: clientCert
        type: string
        description: Client certificate for mTLS
        required: false
        source: connection
        binding: vault://temporal-credentials
      - name: clientKey
        type: string
        description: Client key for mTLS
        required: false
        source: connection
        binding: vault://temporal-credentials
      - name: apiKey
        type: string
        description: API key
        required: false
        source: connection
