apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-figma
  name: Figma Skill
  description: Figma design platform operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: productivity
  tags:
    - figma
    - design
    - ui
    - prototype
  icon: pen-tool
  color: "#F24E1E"
spec:
  executorType: grpc
  nodeTypes:
    - figma-file-list
    - figma-file-get
    - figma-file-export
    - figma-comment-create
    - figma-comment-list
    - figma-team-projects
    - figma-project-files
    - figma-style-list
  inputs:
    figma-file-list:
      - name: apiToken
        type: string
        description: Figma API token
        required: true
        source: connection
        binding: vault://figma-credentials
      - name: projectId
        type: string
        description: Project ID
        required: true
        source: input
    figma-file-get:
      - name: apiToken
        type: string
        description: Figma API token
        required: true
        source: connection
        binding: vault://figma-credentials
      - name: fileKey
        type: string
        description: File key
        required: true
        source: input
      - name: depth
        type: integer
        description: Node depth
        required: false
        source: input
        default: 0
    figma-file-export:
      - name: apiToken
        type: string
        description: Figma API token
        required: true
        source: connection
        binding: vault://figma-credentials
      - name: fileKey
        type: string
        description: File key
        required: true
        source: input
      - name: nodeId
        type: string
        description: Node ID to export
        required: true
        source: input
      - name: format
        type: string
        description: Export format (png, svg, jpg)
        required: false
        source: input
        default: "png"
      - name: scale
        type: number
        description: Scale factor
        required: false
        source: input
        default: 1
    figma-comment-create:
      - name: apiToken
        type: string
        description: Figma API token
        required: true
        source: connection
        binding: vault://figma-credentials
      - name: fileKey
        type: string
        description: File key
        required: true
        source: input
      - name: message
        type: string
        description: Comment message
        required: true
        source: input
      - name: nodeId
        type: string
        description: Node ID to comment on
        required: false
        source: input
      - name: clientId
        type: string
        description: Client user ID
        required: false
        source: input
    figma-comment-list:
      - name: apiToken
        type: string
        description: Figma API token
        required: true
        source: connection
        binding: vault://figma-credentials
      - name: fileKey
        type: string
        description: File key
        required: true
        source: input
    figma-team-projects:
      - name: apiToken
        type: string
        description: Figma API token
        required: true
        source: connection
        binding: vault://figma-credentials
      - name: teamId
        type: string
        description: Team ID
        required: true
        source: input
    figma-project-files:
      - name: apiToken
        type: string
        description: Figma API token
        required: true
        source: connection
        binding: vault://figma-credentials
      - name: projectId
        type: string
        description: Project ID
        required: true
        source: input
    figma-style-list:
      - name: apiToken
        type: string
        description: Figma API token
        required: true
        source: connection
        binding: vault://figma-credentials
      - name: fileKey
        type: string
        description: File key
        required: true
        source: input
  grpc:
    port: 50121
    binary:
      linux-amd64: skill-figma-linux-amd64
      linux-arm64: skill-figma-linux-arm64
      darwin-amd64: skill-figma-darwin-amd64
      darwin-arm64: skill-figma-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - figma:read
    - figma:write