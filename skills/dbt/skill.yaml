apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-dbt
  name: dbt Skill
  description: dbt data transformation operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: data
  tags:
    - dbt
    - transformation
    - data
    - analytics
  icon: database
  color: "#FF694B"
spec:
  executorType: grpc
  nodeTypes:
    - dbt-run
    - dbt-test
    - dbt-compile
    - dbt-docs-generate
    - dbt-seed
    - dbt-snapshot
    - dbt-debug
    - dbt-list
  inputs:
    dbt-run:
      - name: projectDir
        type: string
        description: dbt project directory
        required: true
        source: input
      - name: profilesDir
        type: string
        description: Profiles directory
        required: false
        source: input
      - name: profile
        type: string
        description: Profile name
        required: false
        source: input
      - name: target
        type: string
        description: Target environment
        required: false
        source: input
      - name: select
        type: array
        description: Select models
        required: false
        source: input
      - name: exclude
        type: array
        description: Exclude models
        required: false
        source: input
      - name: tags
        type: array
        description: Filter by tags
        required: false
        source: input
      - name: fullRefresh
        type: boolean
        description: Full refresh
        required: false
        source: default
        default: false
    dbt-test:
      - name: projectDir
        type: string
        description: dbt project directory
        required: true
        source: input
      - name: profilesDir
        type: string
        description: Profiles directory
        required: false
        source: input
      - name: profile
        type: string
        description: Profile name
        required: false
        source: input
      - name: target
        type: string
        description: Target environment
        required: false
        source: input
      - name: select
        type: array
        description: Select tests
        required: false
        source: input
      - name: exclude
        type: array
        description: Exclude tests
        required: false
        source: input
      - name: severity
        type: string
        description: Severity threshold
        required: false
        source: input
    dbt-compile:
      - name: projectDir
        type: string
        description: dbt project directory
        required: true
        source: input
      - name: profilesDir
        type: string
        description: Profiles directory
        required: false
        source: input
      - name: profile
        type: string
        description: Profile name
        required: false
        source: input
      - name: target
        type: string
        description: Target environment
        required: false
        source: input
      - name: select
        type: array
        description: Select models
        required: false
        source: input
    dbt-docs-generate:
      - name: projectDir
        type: string
        description: dbt project directory
        required: true
        source: input
      - name: profilesDir
        type: string
        description: Profiles directory
        required: false
        source: input
      - name: profile
        type: string
        description: Profile name
        required: false
        source: input
      - name: target
        type: string
        description: Target environment
        required: false
        source: input
    dbt-seed:
      - name: projectDir
        type: string
        description: dbt project directory
        required: true
        source: input
      - name: profilesDir
        type: string
        description: Profiles directory
        required: false
        source: input
      - name: profile
        type: string
        description: Profile name
        required: false
        source: input
      - name: target
        type: string
        description: Target environment
        required: false
        source: input
      - name: select
        type: array
        description: Select seed files
        required: false
        source: input
    dbt-snapshot:
      - name: projectDir
        type: string
        description: dbt project directory
        required: true
        source: input
      - name: profilesDir
        type: string
        description: Profiles directory
        required: false
        source: input
      - name: profile
        type: string
        description: Profile name
        required: false
        source: input
      - name: target
        type: string
        description: Target environment
        required: false
        source: input
      - name: select
        type: array
        description: Select snapshots
        required: false
        source: input
    dbt-debug:
      - name: projectDir
        type: string
        description: dbt project directory
        required: true
        source: input
      - name: profilesDir
        type: string
        description: Profiles directory
        required: false
        source: input
      - name: profile
        type: string
        description: Profile name
        required: false
        source: input
    dbt-list:
      - name: projectDir
        type: string
        description: dbt project directory
        required: true
        source: input
      - name: profilesDir
        type: string
        description: Profiles directory
        required: false
        source: input
      - name: profile
        type: string
        description: Profile name
        required: false
        source: input
      - name: target
        type: string
        description: Target environment
        required: false
        source: input
      - name: resourceType
        type: string
        description: Resource type to list (model, test, seed, snapshot)
        required: false
        source: input
  grpc:
    port: 50103
    binary:
      linux-amd64: skill-dbt-linux-amd64
      linux-arm64: skill-dbt-linux-arm64
      darwin-amd64: skill-dbt-darwin-amd64
      darwin-arm64: skill-dbt-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - dbt:read
    - dbt:write