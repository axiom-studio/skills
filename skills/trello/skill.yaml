apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-trello
  name: Trello Skill
  description: Trello board management operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: project-management
  tags:
    - trello
    - kanban
    - board
    - cards
  icon: columns
  color: "#0052CC"
spec:
  executorType: grpc
  nodeTypes:
    - trello-board-list
    - trello-board-get
    - trello-card-list
    - trello-card-create
    - trello-card-update
    - trello-card-move
    - trello-list-list
    - trello-label-add
    - trello-member-add
  inputs:
    trello-board-list:
      - name: apiKey
        type: string
        description: Trello API key
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: token
        type: string
        description: Trello token
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: filter
        type: string
        description: Filter (members, all)
        required: false
        source: input
    trello-board-get:
      - name: apiKey
        type: string
        description: Trello API key
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: token
        type: string
        description: Trello token
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: boardId
        type: string
        description: Board ID
        required: true
        source: input
    trello-card-list:
      - name: apiKey
        type: string
        description: Trello API key
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: token
        type: string
        description: Trello token
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: boardId
        type: string
        description: Board ID
        required: true
        source: input
      - name: listId
        type: string
        description: Filter by list
        required: false
        source: input
    trello-card-create:
      - name: apiKey
        type: string
        description: Trello API key
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: token
        type: string
        description: Trello token
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: listId
        type: string
        description: List ID
        required: true
        source: input
      - name: name
        type: string
        description: Card name
        required: true
        source: input
      - name: description
        type: string
        description: Card description
        required: false
        source: input
      - name: dueDate
        type: string
        description: Due date
        required: false
        source: input
      - name: labels
        type: array
        description: Label IDs
        required: false
        source: input
    trello-card-update:
      - name: apiKey
        type: string
        description: Trello API key
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: token
        type: string
        description: Trello token
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: cardId
        type: string
        description: Card ID
        required: true
        source: input
      - name: name
        type: string
        description: Card name
        required: false
        source: input
      - name: description
        type: string
        description: Card description
        required: false
        source: input
      - name: dueDate
        type: string
        description: Due date
        required: false
        source: input
    trello-card-move:
      - name: apiKey
        type: string
        description: Trello API key
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: token
        type: string
        description: Trello token
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: cardId
        type: string
        description: Card ID
        required: true
        source: input
      - name: listId
        type: string
        description: Target list ID
        required: true
        source: input
      - name: position
        type: integer
        description: Position in list
        required: false
        source: input
    trello-list-list:
      - name: apiKey
        type: string
        description: Trello API key
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: token
        type: string
        description: Trello token
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: boardId
        type: string
        description: Board ID
        required: true
        source: input
    trello-label-add:
      - name: apiKey
        type: string
        description: Trello API key
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: token
        type: string
        description: Trello token
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: cardId
        type: string
        description: Card ID
        required: true
        source: input
      - name: labelId
        type: string
        description: Label ID
        required: true
        source: input
    trello-member-add:
      - name: apiKey
        type: string
        description: Trello API key
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: token
        type: string
        description: Trello token
        required: true
        source: connection
        binding: vault://trello-credentials
      - name: boardId
        type: string
        description: Board ID
        required: true
        source: input
      - name: memberId
        type: string
        description: Member ID or email
        required: true
        source: input
  grpc:
    port: 50106
    binary:
      linux-amd64: skill-trello-linux-amd64
      linux-arm64: skill-trello-linux-arm64
      darwin-amd64: skill-trello-darwin-amd64
      darwin-arm64: skill-trello-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - trello:read
    - trello:write