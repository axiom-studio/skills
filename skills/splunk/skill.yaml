  name: Splunk Skill
  description: Splunk log analytics operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: monitoring
  tags:
    - splunk
    - logs
    - analytics
    - siem
  icon: search
  color: "#000000"
spec:
