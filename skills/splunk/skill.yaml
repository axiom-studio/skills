    splunk-search:
      - name: host
        type: string
        description: Splunk host URL
        required: true
        source: input
      - name: token
        type: string
        description: Splunk API token
        required: true
        source: connection
        binding: vault://splunk-credentials
      - name: search
        type: string
        description: SPL search query
        required: true
        source: input
      - name: earliest
        type: string
        description: Earliest time (e.g., -24h)
        required: false
        source: input
        default: "-24h"
      - name: latest
        type: string
        description: Latest time (e.g., now)
        required: false
        source: input
        default: "now"
      - name: index
        type: string
        description: Index to search
        required: false
        source: input
      - name: maxCount
        type: integer
        description: Max results
        required: false
        source: input
    splunk-saved-search:
      - name: host
        type: string
        description: Splunk host URL
        required: true
        source: input
      - name: token
        type: string
