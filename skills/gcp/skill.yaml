apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-gcp
  name: Google Cloud Skill
  description: Google Cloud Platform operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: cloud
  tags:
    - gcp
    - google
    - cloud
    - gke
    - compute
  icon: cloud
  color: "#4285F4"
spec:
  executorType: grpc
  nodeTypes:
    - gcp-instance-list
    - gcp-instance-start
    - gcp-instance-stop
    - gcp-gke-list
    - gcp-gke-get-credentials
    - gcp-function-list
    - gcp-function-deploy
    - gcp-function-invoke
    - gcp-pubsub-publish
    - gcp-pubsub-subscribe
    - gcp-storage-list
    - gcp-storage-upload
    - gcp-storage-download
  grpc:
    port: 50081
    binary:
      linux-amd64: skill-gcp-linux-amd64
      linux-arm64: skill-gcp-linux-arm64
      darwin-amd64: skill-gcp-darwin-amd64
      darwin-arm64: skill-gcp-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - gcp:read
    - gcp:write