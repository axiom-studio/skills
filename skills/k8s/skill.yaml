apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-k8s
  name: Kubernetes Skill
  description: Kubernetes operations for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: infrastructure
  tags:
    - kubernetes
    - k8s
    - infrastructure
  icon: kubernetes
  color: "#326CE5"
spec:
  executorType: grpc
  nodeTypes:
    - k8s-get
    - k8s-list
    - k8s-logs
    - k8s-events
    - k8s-restart
    - k8s-scale
    - k8s-patch
    - k8s-delete
    - k8s-event
    - k8s-log-monitor
    - k8s-watch
  inputs:
    k8s-get:
      - name: kind
        type: string
        description: Resource kind (Pod, Deployment, Service, etc.)
        required: true
        source: input
      - name: name
        type: string
        description: Resource name
        required: true
        source: input
      - name: namespace
        type: string
        description: Kubernetes namespace
        required: false
        source: input
        default: "default"
      - name: kubeconfig
        type: string
        description: Kubeconfig path or content
        required: false
        source: connection
        binding: vault://k8s-credentials
    k8s-list:
      - name: kind
        type: string
        description: Resource kind
        required: true
        source: input
      - name: namespace
        type: string
        description: Kubernetes namespace
        required: false
        source: input
      - name: labelSelector
        type: string
        description: Label selector filter
        required: false
        source: input
      - name: kubeconfig
        type: string
        description: Kubeconfig path or content
        required: false
        source: connection
        binding: vault://k8s-credentials
    k8s-logs:
      - name: name
        type: string
        description: Pod name
        required: true
        source: input
      - name: namespace
        type: string
        description: Kubernetes namespace
        required: false
        source: input
        default: "default"
      - name: container
        type: string
        description: Container name
        required: false
        source: input
      - name: tail
        type: integer
        description: Number of lines from end
        required: false
        source: input
        default: 100
      - name: follow
        type: boolean
        description: Follow log output
        required: false
        source: default
        default: false
      - name: kubeconfig
        type: string
        description: Kubeconfig path or content
        required: false
        source: connection
        binding: vault://k8s-credentials
    k8s-events:
      - name: namespace
        type: string
        description: Kubernetes namespace
        required: false
        source: input
        default: "default"
      - name: fieldSelector
        type: string
        description: Field selector
        required: false
        source: input
      - name: kubeconfig
        type: string
        description: Kubeconfig path or content
        required: false
        source: connection
        binding: vault://k8s-credentials
    k8s-restart:
      - name: kind
        type: string
        description: Resource kind (Deployment, StatefulSet, DaemonSet)
        required: true
        source: input
      - name: name
        type: string
        description: Resource name
        required: true
        source: input
      - name: namespace
        type: string
        description: Kubernetes namespace
        required: false
        source: input
        default: "default"
      - name: kubeconfig
        type: string
        description: Kubeconfig path or content
        required: false
        source: connection
        binding: vault://k8s-credentials
    k8s-scale:
      - name: kind
        type: string
        description: Resource kind (Deployment, StatefulSet, ReplicaSet)
        required: true
        source: input
      - name: name
        type: string
        description: Resource name
        required: true
        source: input
      - name: replicas
        type: integer
        description: Desired replica count
        required: true
        source: input
      - name: namespace
        type: string
        description: Kubernetes namespace
        required: false
        source: input
        default: "default"
      - name: kubeconfig
        type: string
        description: Kubeconfig path or content
        required: false
        source: connection
        binding: vault://k8s-credentials
    k8s-patch:
      - name: kind
        type: string
        description: Resource kind
        required: true
        source: input
      - name: name
        type: string
        description: Resource name
        required: true
        source: input
      - name: patch
        type: object
        description: Patch specification
        required: true
        source: input
      - name: namespace
        type: string
        description: Kubernetes namespace
        required: false
        source: input
        default: "default"
      - name: patchType
        type: string
        description: Patch type (strategic, merge, json)
        required: false
        source: input
        default: "strategic"
      - name: kubeconfig
        type: string
        description: Kubeconfig path or content
        required: false
        source: connection
        binding: vault://k8s-credentials
    k8s-delete:
      - name: kind
        type: string
        description: Resource kind
        required: true
        source: input
      - name: name
        type: string
        description: Resource name
        required: true
        source: input
      - name: namespace
        type: string
        description: Kubernetes namespace
        required: false
        source: input
        default: "default"
      - name: kubeconfig
        type: string
        description: Kubeconfig path or content
        required: false
        source: connection
        binding: vault://k8s-credentials
    k8s-event:
      - name: kind
        type: string
        description: Resource kind
        required: true
        source: input
      - name: name
        type: string
        description: Resource name
        required: true
        source: input
      - name: namespace
        type: string
        description: Kubernetes namespace
        required: false
        source: input
        default: "default"
      - name: kubeconfig
        type: string
        description: Kubeconfig path or content
        required: false
        source: connection
        binding: vault://k8s-credentials
    k8s-log-monitor:
      - name: namespace
        type: string
        description: Kubernetes namespace
        required: false
        source: input
        default: "default"
      - name: labelSelector
        type: string
        description: Label selector
        required: false
        source: input
      - name: pattern
        type: string
        description: Log pattern to monitor
        required: false
        source: input
      - name: kubeconfig
        type: string
        description: Kubeconfig path or content
        required: false
        source: connection
        binding: vault://k8s-credentials
    k8s-watch:
      - name: kind
        type: string
        description: Resource kind
        required: true
        source: input
      - name: namespace
        type: string
        description: Kubernetes namespace
        required: false
        source: input
        default: "default"
      - name: labelSelector
        type: string
        description: Label selector
        required: false
        source: input
      - name: kubeconfig
        type: string
        description: Kubeconfig path or content
        required: false
        source: connection
        binding: vault://k8s-credentials
  grpc:
    port: 50053
    binary:
      linux-amd64: skill-k8s-linux-amd64
      linux-arm64: skill-k8s-linux-arm64
      darwin-amd64: skill-k8s-darwin-amd64
      darwin-arm64: skill-k8s-darwin-arm64
  dependencies:
    standard:
      - logger
      - k8s-client
  permissions:
    - k8s:read
    - k8s:write