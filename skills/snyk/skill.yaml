apiVersion: skills.axiom.dev/v1
kind: Skill
metadata:
  id: skill-snyk
  name: Snyk Skill
  description: Snyk security vulnerability scanning for Atlas agents
  author: Axiom Studio
  authorEmail: engineering@axiomstudio.ai
  version: 1.0.0
  license: MIT
  category: security
  tags:
    - snyk
    - security
    - vulnerability
    - scanning
  icon: shield
  color: "#4C4A73"
spec:
  executorType: grpc
  nodeTypes:
    - snyk-project-list
    - snyk-project-scan
    - snyk-issue-list
    - snyk-issue-ignore
    - snyk-test-deps
    - snyk-monitor
    - snyk-severity-list
    - snyk-license-list
  inputs:
    snyk-project-list:
      - name: apiToken
        type: string
        description: Snyk API token
        required: true
        source: connection
        binding: vault://snyk-credentials
      - name: orgId
        type: string
        description: Organization ID
        required: false
        source: input
    snyk-project-scan:
      - name: apiToken
        type: string
        description: Snyk API token
        required: true
        source: connection
        binding: vault://snyk-credentials
      - name: projectId
        type: string
        description: Project ID
        required: true
        source: input
    snyk-issue-list:
      - name: apiToken
        type: string
        description: Snyk API token
        required: true
        source: connection
        binding: vault://snyk-credentials
      - name: projectId
        type: string
        description: Project ID
        required: true
        source: input
      - name: severity
        type: string
        description: Filter by severity
        required: false
        source: input
    snyk-issue-ignore:
      - name: apiToken
        type: string
        description: Snyk API token
        required: true
        source: connection
        binding: vault://snyk-credentials
      - name: projectId
        type: string
        description: Project ID
        required: true
        source: input
      - name: issueId
        type: string
        description: Issue ID
        required: true
        source: input
      - name: reason
        type: string
        description: Ignore reason
        required: true
        source: input
      - name: expires
        type: string
        description: Expiry date
        required: false
        source: input
    snyk-test-deps:
      - name: apiToken
        type: string
        description: Snyk API token
        required: true
        source: connection
        binding: vault://snyk-credentials
      - name: projectId
        type: string
        description: Project ID
        required: true
        source: input
    snyk-monitor:
      - name: apiToken
        type: string
        description: Snyk API token
        required: true
        source: connection
        binding: vault://snyk-credentials
      - name: projectId
        type: string
        description: Project ID
        required: true
        source: input
    snyk-severity-list:
      - name: apiToken
        type: string
        description: Snyk API token
        required: true
        source: connection
        binding: vault://snyk-credentials
      - name: projectId
        type: string
        description: Project ID
        required: true
        source: input
    snyk-license-list:
      - name: apiToken
        type: string
        description: Snyk API token
        required: true
        source: connection
        binding: vault://snyk-credentials
      - name: projectId
        type: string
        description: Project ID
        required: true
        source: input
  grpc:
    port: 50095
    binary:
      linux-amd64: skill-snyk-linux-amd64
      linux-arm64: skill-snyk-linux-arm64
      darwin-amd64: skill-snyk-darwin-amd64
      darwin-arm64: skill-snyk-darwin-arm64
  dependencies:
    standard:
      - logger
      - secrets
  permissions:
    - snyk:read
    - snyk:write